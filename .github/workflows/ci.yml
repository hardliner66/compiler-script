name: Nightly Build

permissions:
    contents: write

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: "0 4 * * *" # Every day at 4 AM UTC

env:
    CARGO_TERM_COLOR: always

jobs:
    build-linux:
        runs-on: ubuntu-latest
        needs: release
        steps:
            - uses: actions/checkout@v2

            - name: Run tests
              run: cargo test -p compiler-script --verbose

            - name: Run build
              run: |
                  cargo build --release
                  strip --strip-all ./target/release/compiler-script

            - name: Publish artifact to nightly release
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                gh release delete linux-nightly --yes
                gh release create linux-nightly --prerelease --title "Nightly Linux Build" --notes "Automated nightly linux build" ./target/release/compiler-script

    build-macos:
        runs-on: macos-latest
        needs: release

        steps:
            - uses: actions/checkout@v2

            - name: Run tests
              run: cargo test -p ssd --verbose

            - name: Run build
              run: |
                  cargo build --release

            - name: Publish artifact to nightly release
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                gh release delete macos-nightly --yes
                gh release create macos-nightly --prerelease --title "Nightly MacOS Build" --notes "Automated nightly macos build" ./target/release/compiler-script

    build-windows:
        runs-on: windows-2019
        needs: release

        steps:
            - uses: actions/checkout@v2

            - name: Run tests
              run: cargo test -p compiler-script --verbose

            - name: Run build
              run: cargo build -p compiler-script --release

            - name: Publish artifact to nightly release
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                gh release delete windows-nightly --yes
                gh release create windows-nightly --prerelease --title "Nightly Windows Build" --notes "Automated nightly windows build" ./target/release/compiler-script.exe